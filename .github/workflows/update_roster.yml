name: 로스터 갱신 (주 1회 + 수동)

on:
  schedule:
    - cron: "0 19 * * 0"  # 매주 일요일 KST 04:00 (UTC 19:00)
  workflow_dispatch:       # 트레이드/외국인 영입 시 수동 실행

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4 lxml

      - name: 로스터 수집
        run: python data/collect_roster.py

      - name: 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/roster.json
          git diff --cached --quiet || git commit -m "data: 로스터 갱신 $(date +'%Y-%m-%d')"
          git push
