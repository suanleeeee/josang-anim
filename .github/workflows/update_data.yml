name: KBO 데이터 자동 갱신

on:
  schedule:
    - cron: "0 19 * * *"  # 매일 KST 04:00 (UTC 19:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 데이터 수집
        run: python data/collect.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet || git commit -m "data: KBO 데이터 자동 갱신 $(date +'%Y-%m-%d')"
          git push
