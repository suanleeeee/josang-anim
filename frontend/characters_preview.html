<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>구단 엠블럼 시안</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
    body {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      background: #FFF5D5;
      padding: 40px 24px;
      margin: 0;
    }
    h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 800;
      color: #2C1810;
      margin-bottom: 8px;
    }
    p.sub {
      text-align: center;
      font-size: 0.8rem;
      color: #7A5C2E;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border: 1px solid rgba(196,130,10,0.15);
    }
    .card img {
      width: 110px;
      height: 110px;
      object-fit: contain;
    }
    .team-name {
      font-size: 0.78rem;
      font-weight: 700;
      color: #2C1810;
      text-align: center;
      line-height: 1.4;
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <h1>구단 엠블럼 시안</h1>
  <p class="sub">26 구단 엠블럼 폴더 기준</p>
  <div class="grid">
    <div class="card">
      <img src="images/characters/26 구단 엠블럼/SAMSUNGlions.svg" alt="삼성 라이온즈"/>
      <div class="team-name">삼성 라이온즈</div>
    </div>
    <div class="card">
      <img src="images/characters/26 구단 엠블럼/LGtwins.svg" alt="LG 트윈스"/>
      <div class="team-name">LG 트윈스</div>
    </div>
    <div class="card">
      <img src="images/characters/26 구단 엠블럼/KIAtigers.svg" alt="기아 타이거즈"/>
      <div class="team-name">기아 타이거즈</div>
    </div>
    <div class="card">
      <img src="images/characters/26 구단 엠블럼/LOTTEgiants.svg" alt="롯데 자이언츠"/>
      <div class="team-name">롯데 자이언츠</div>
    </div>
    <div class="card">
      <img src="images/characters/26 구단 엠블럼/HANWHAeagles.svg" alt="한화 이글스"/>
      <div class="team-name">한화 이글스</div>
    </div>
    <div class="card">
      <img src="images/characters/26 구단 엠블럼/DOOSANbears.svg" alt="두산 베어스"/>
      <div class="team-name">두산 베어스</div>
    </div>
    <div class="card">
      <img src="images/characters/26 구단 엠블럼/KTwiz.svg" alt="KT 위즈"/>
      <div class="team-name">KT 위즈</div>
    </div>
    <div class="card">
      <img src="images/characters/26 구단 엠블럼/SSGlanders.svg" alt="SSG 랜더스"/>
      <div class="team-name">SSG 랜더스</div>
    </div>
    <div class="card">
      <img src="images/characters/26 구단 엠블럼/NCdinos.svg" alt="NC 다이노스"/>
      <div class="team-name">NC 다이노스</div>
    </div>
    <div class="card">
      <img src="images/characters/26 구단 엠블럼/KIWOOMheroes.svg" alt="키움 히어로즈"/>
      <div class="team-name">키움 히어로즈</div>
    </div>
  </div>
</body>
</html>
